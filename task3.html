<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JavaScript Task</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            padding-top: 100px; 
            background-color: #f0f4f8; 
        }
        .container {
            display: inline-block;
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #3182ce;
        }
        h1 { color: #2c3e50; }
        .result-box {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Task 3: Voting Eligibility</h1>
        <p>This page uses JavaScript to check if you are eligible to vote.</p>

        <script>
            
            var age = prompt("Please enter your age:");

          
            if (age === null || age === "") {
                document.write("<div class='result-box' style='color: #718096;'>No input provided.</div>");
            } else if (age >= 18) {
                document.write("<div class='result-box' style='color: #2f855a; background: #c6f6d5;'>✅ Eligible to vote.</div>");
            } else {
                document.write("<div class='result-box' style='color: #c53030; background: #fed7d7;'>❌ Not eligible to vote.</div>");
            }
        </script>
        
        <br>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; background: #3182ce; color: white; border: none; border-radius: 5px;">Re-check Age</button>
    </div>

</body>
</html>
