<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial; padding: 25px; }
        h2 { color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>Latest Technologies in Classrooms</h2>
    <table>
        <tr>
            <th>Technology</th>
            <th>Impact</th>
        </tr>
        <tr>
            <td>Artificial Intelligence (AI)</td>
            <td>Personalized tutoring and grading.</td>
        </tr>
        <tr>
            <td>Gamification</td>
            <td>Learning through games and rewards.</td>
        </tr>
        <tr>
            <td>Cloud Classrooms</td>
            <td>Students can access lessons from anywhere.</td>
        </tr>
    </table>
</body>
</html>
